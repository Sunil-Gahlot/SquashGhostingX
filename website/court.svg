  <!-- ── Staggered plank-end joints — natural board seaming (JOINT_SPACING=120) ── -->
  <g stroke="rgb(155,98,20)" stroke-width="1.0" opacity="0.168">
    <line x1="8"   y1="128" x2="632" y2="128"/>
    <line x1="80"  y1="248" x2="632" y2="248"/>
    <line x1="44"  y1="368" x2="632" y2="368"/>
    <line x1="116" y1="488" x2="632" y2="488"/>
    <line x1="26"  y1="608" x2="632" y2="608"/>
    <line x1="8"   y1="728" x2="632" y2="728"/>
    <line x1="80"  y1="848" x2="632" y2="848"/>
  </g>

  <!-- ── Court boundary — 6px WSF red #CC1500 (2" spec), centred on court edge ── -->
  <rect x="8" y="8" width="624" height="959" fill="none" stroke="#CC1500" stroke-width="6"/>

  <!-- ── Short line — 4.26m from front wall ── -->
  <line x1="8" y1="426" x2="632" y2="426" stroke="#CC1500" stroke-width="5"/>

  <!-- ── Half-court line — short line to back wall ── -->
  <line x1="320" y1="426" x2="320" y2="967" stroke="#CC1500" stroke-width="5"/>

  <!-- ── Left service box ── -->
  <rect x="8"   y="426" width="160" height="160" fill="none" stroke="#CC1500" stroke-width="5"/>

  <!-- ── Right service box ── -->
  <rect x="472" y="426" width="160" height="160" fill="none" stroke="#CC1500" stroke-width="5"/>

