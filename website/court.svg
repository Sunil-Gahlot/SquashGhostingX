  <!-- Alternating slightly deeper planks (20px wide vertical strips) -->
  <rect x="20"  y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="60"  y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="100" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="140" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="180" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="220" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="260" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="300" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="340" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="380" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="420" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="460" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="500" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="540" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="580" y="0" width="20" height="975" fill="#EBC04A"/>
  <rect x="620" y="0" width="20" height="975" fill="#EBC04A"/>

  <!-- Plank groove lines -->
  <g stroke="#C89820" stroke-width="1" opacity="0.5">
    <line x1="20"  y1="0" x2="20"  y2="975"/>
    <line x1="40"  y1="0" x2="40"  y2="975"/>
    <line x1="60"  y1="0" x2="60"  y2="975"/>
    <line x1="80"  y1="0" x2="80"  y2="975"/>
    <line x1="100" y1="0" x2="100" y2="975"/>
    <line x1="120" y1="0" x2="120" y2="975"/>
    <line x1="140" y1="0" x2="140" y2="975"/>
    <line x1="160" y1="0" x2="160" y2="975"/>
    <line x1="180" y1="0" x2="180" y2="975"/>
    <line x1="200" y1="0" x2="200" y2="975"/>
    <line x1="220" y1="0" x2="220" y2="975"/>
    <line x1="240" y1="0" x2="240" y2="975"/>
    <line x1="260" y1="0" x2="260" y2="975"/>
    <line x1="280" y1="0" x2="280" y2="975"/>
    <line x1="300" y1="0" x2="300" y2="975"/>
    <line x1="320" y1="0" x2="320" y2="975"/>
    <line x1="340" y1="0" x2="340" y2="975"/>
    <line x1="360" y1="0" x2="360" y2="975"/>
    <line x1="380" y1="0" x2="380" y2="975"/>
    <line x1="400" y1="0" x2="400" y2="975"/>
    <line x1="420" y1="0" x2="420" y2="975"/>
    <line x1="440" y1="0" x2="440" y2="975"/>
    <line x1="460" y1="0" x2="460" y2="975"/>
    <line x1="480" y1="0" x2="480" y2="975"/>
    <line x1="500" y1="0" x2="500" y2="975"/>
    <line x1="520" y1="0" x2="520" y2="975"/>
    <line x1="540" y1="0" x2="540" y2="975"/>
    <line x1="560" y1="0" x2="560" y2="975"/>
    <line x1="580" y1="0" x2="580" y2="975"/>
    <line x1="600" y1="0" x2="600" y2="975"/>
    <line x1="620" y1="0" x2="620" y2="975"/>
  </g>

  <!-- Staggered plank-end joints -->
  <g stroke="#C09018" stroke-width="1.2" opacity="0.4">
    <line x1="0"   y1="195" x2="300" y2="195"/>
    <line x1="0"   y1="390" x2="200" y2="390"/>
    <line x1="0"   y1="585" x2="260" y2="585"/>
    <line x1="0"   y1="780" x2="300" y2="780"/>
    <line x1="200" y1="293" x2="420" y2="293"/>
    <line x1="260" y1="488" x2="480" y2="488"/>
    <line x1="300" y1="683" x2="500" y2="683"/>
    <line x1="380" y1="146" x2="580" y2="146"/>
    <line x1="420" y1="341" x2="640" y2="341"/>
    <line x1="480" y1="536" x2="640" y2="536"/>
    <line x1="500" y1="731" x2="640" y2="731"/>
  </g>

  <!-- Court boundary — WSF red -->
  <rect x="3" y="3" width="634" height="969" fill="none" stroke="#CC1500" stroke-width="5"/>

  <!-- Tin strip — front wall base -->
  <rect x="3" y="3" width="634" height="12" fill="#AA1800" opacity="0.8"/>

  <!-- Short line -->
  <line x1="3" y1="426" x2="637" y2="426" stroke="#DD2000" stroke-width="4.5"/>

  <!-- Half-court line -->
  <line x1="320" y1="426" x2="320" y2="972" stroke="#DD2000" stroke-width="4.5"/>

  <!-- Left service box -->
  <rect x="3" y="426" width="160" height="160" fill="none" stroke="#DD2000" stroke-width="4"/>

  <!-- Right service box -->
  <rect x="477" y="426" width="160" height="160" fill="none" stroke="#DD2000" stroke-width="4"/>

</svg>
