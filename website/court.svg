<?xml version="1.0" encoding="UTF-8"?>
<!--
  SquashGhostingX wooden court — synced with CourtCanvas.tsx wooden mode.
  ViewBox: 640 × 975  |  CIX/CIY=8 inset  |  PLANK_W=18  |  WSF red #CC1500
  Palette: surround #0E0B06  floorBase #E8C87C  A #F4DF9C  B #EDD38A  C #F9E9A8
  Floor colours lifted +6 L* to compensate for browser sRGB vs P3 phone display.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 975">

  <!-- ── Out-of-bounds dark surround ── -->
  <rect x="0" y="0" width="640" height="975" fill="#0E0B06"/>

  <!-- ── Base floor fill — prevents gap bleed-through between planks ── -->
  <rect x="8" y="8" width="624" height="959" fill="#E8C87C"/>

  <!-- ── Wood planks — 18px wide, 3-colour rotation (A/B/C maple variation) ── -->
  <rect x="8"   y="8" width="18" height="959" fill="#F4DF9C"/>
  <rect x="26"  y="8" width="18" height="959" fill="#EDD38A"/>
  <rect x="44"  y="8" width="18" height="959" fill="#F9E9A8"/>
